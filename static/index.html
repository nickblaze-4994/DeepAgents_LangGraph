<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADK + Gemini Live · Voice Research Agent</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --accent: #6ea8fe;
        --live: #8be9b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: radial-gradient(1000px 600px at 50% -10%, #1a1f2e, var(--bg));
        color: #e8eaf0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        padding: 24px;
      }
      h1 { font-size: 1.5rem; margin: 0; font-weight: 600; }
      .sub { color: #9aa3b2; margin: -10px 0 0; font-size: 0.95rem; }
      #talk {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        font-weight: 600;
        color: #06101f;
        background: var(--accent);
        transition: transform 0.08s ease, background 0.2s ease, box-shadow 0.2s ease;
      }
      #talk:active { transform: scale(0.96); }
      #talk.live {
        background: var(--live);
        box-shadow: 0 0 0 0 rgba(139, 233, 184, 0.6);
        animation: pulse 1.6s infinite;
      }
      @keyframes pulse {
        70% { box-shadow: 0 0 0 24px rgba(139, 233, 184, 0); }
        100% { box-shadow: 0 0 0 0 rgba(139, 233, 184, 0); }
      }
      #status { color: #9aa3b2; min-height: 1.2em; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <h1>🎙️ Voice Research Agent</h1>
    <p class="sub">Google ADK · Gemini Live · LangChain deepagents</p>
    <button id="talk">Start talking</button>
    <div id="status">Click to connect and allow microphone access.</div>

    <script src="/app.js"></script>
  </body>
</html>
